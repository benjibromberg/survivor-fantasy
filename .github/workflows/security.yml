name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 13 * * *" # Daily at 8am ET (13:00 UTC)

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snyk-code:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Snyk Code (SAST)
        uses: snyk/actions/python@9adf32b1121593767fc3c057af55b55db032dc04 # master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always()
        with:
          sarif_file: snyk.sarif

      - name: Fail on high or critical severity findings
        if: always()
        run: |
          if [ ! -f snyk.sarif ]; then
            echo "::error::No SARIF file produced — Snyk scan may have failed"
            exit 1
          fi
          HIGH_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' snyk.sarif)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Found $HIGH_COUNT high/critical severity finding(s)"
            exit 1
          fi
          echo "No high/critical findings — passed"

  snyk-sca:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Snyk Open Source (SCA)
        uses: snyk/actions/python@9adf32b1121593767fc3c057af55b55db032dc04 # master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always()
        with:
          sarif_file: snyk.sarif

      - name: Fail on high or critical severity findings
        if: always()
        run: |
          if [ ! -f snyk.sarif ]; then
            echo "::error::No SARIF file produced — Snyk scan may have failed"
            exit 1
          fi
          HIGH_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' snyk.sarif)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Found $HIGH_COUNT high/critical severity finding(s)"
            exit 1
          fi
          echo "No high/critical findings — passed"

  snyk-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker build --progress=plain -t survivor-fantasy:latest .

      - name: Snyk Container Scan
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: survivor-fantasy:latest
          args: --file=Dockerfile --sarif-file-output=snyk.sarif

      - name: Sanitize SARIF
        if: always()
        run: |
          # Snyk container scan has two SARIF issues:
          # 1. Invalid security-severity values ("undefined", "null") that GitHub rejects
          #    See https://github.com/github/codeql-action/issues/2187
          # 2. Rule descriptions bake in the wrong severity prefix — almost all say
          #    "Low severity" regardless of the actual CVSS score
          # Fix both: sanitize invalid values and rewrite description prefixes to
          # match the actual security-severity score.
          if [ -f snyk.sarif ]; then
            jq '
              def severity_label:
                (if . == null or . == "undefined" or . == "null" then 0
                 else (tonumber? // 0) end) as $score |
                if $score >= 9.0 then "Critical"
                elif $score >= 7.0 then "High"
                elif $score >= 4.0 then "Medium"
                else "Low" end;

              .runs |= [.[] |
                .tool.driver.rules |= [.[] |
                  # Sanitize invalid security-severity values to "0"
                  (if .properties["security-severity"] == "undefined" or
                      .properties["security-severity"] == "null"
                   then .properties["security-severity"] = "0"
                   else . end) |
                  # Rewrite severity prefix in descriptions to match actual score
                  (.properties["security-severity"] | severity_label) as $label |
                  (if .shortDescription.text then
                    .shortDescription.text |= sub("^(Low|Medium|High|Critical) severity"; "\($label) severity")
                   else . end) |
                  (if .fullDescription.text then
                    .fullDescription.text |= sub("^(Low|Medium|High|Critical) severity"; "\($label) severity")
                   else . end)
                ]
              ]
            ' snyk.sarif > snyk_fixed.sarif && mv snyk_fixed.sarif snyk.sarif
          fi

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always()
        with:
          sarif_file: snyk.sarif
