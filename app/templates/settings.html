{% extends "base.html" %}
{% block title %}Settings - Survivor Fantasy{% endblock %}
{% block content %}
<article style="max-width: 400px; margin: 0 auto;">
    <h2>Settings</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>
            Display Name
            <input type="text" name="display_name" value="{{ current_user.display_name or '' }}"
                   placeholder="{{ current_user.username }}">
        </label>
        <small>This is how your name appears on the leaderboard. Leave blank to use your username.</small>
        <br><br>
        <button type="submit">Save</button>
    </form>
</article>
{% endblock %}
